[phases.setup]
nixPkgs = ["python311", "ffmpeg"]

[phases.install]
cmds = [
  "curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py",
  "python3.11 get-pip.py --break-system-packages",
  "python3.11 -m pip install --break-system-packages -r 'SORSUE Alqaid/requirements.txt'"
]

[start]
cmd = "cd 'SORSUE Alqaid' && python3.11 main.py"
